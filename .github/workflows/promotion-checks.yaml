name: Promotion Checks

on:
  push:
    branches:
      - 'env/**-next'
      - 'env/**'

permissions:
  statuses: write
  checks: write

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: echo "Integration tests passed for ${{ github.sha }}"

  report-status:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Report integration-tests status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'integration-tests',
              description: 'Integration tests passed',
            });

      - name: Report argocd-health status
        if: ${{ !contains(github.ref, '-next') }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'argocd-health',
              description: 'ArgoCD health check passed',
            });
